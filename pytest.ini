[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers
markers =
    golden: golden-set evaluation cases (Red Team rules)
    integration: tests that hit external services (skipped by default in CI)
filterwarnings =
    # Upstream bs4 4.12 + lxml 5 emit a deprecation warning that's not actionable
    # from our code. Drop when bs4 ships a fix.
    ignore:The 'strip_cdata' option of HTMLParser:DeprecationWarning
# asyncio_mode = auto  ; re-enable once pytest-asyncio is installed (M3)
